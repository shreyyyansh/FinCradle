<!DOCTYPE html>
<html>
<head>
<title>Register - FinCradle</title>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="topbar">
    <div class="brand">FinCradle</div>
</div>

<div class="container" style="max-width:420px;margin-top:80px">

    <div class="card">
        <h2 style="text-align:center;">Create Account</h2>
        <p style="text-align:center;color:var(--muted);margin-bottom:2rem">
            Start tracking your finances with AI
        </p>

        <form method="POST">
            <input class="input" type="text" name="name" placeholder="Full Name" required>
            <input class="input" type="email" name="email" placeholder="Email address" required>
            <input class="input" type="password" name="password" placeholder="Password" required>

            <button style="width:100%;margin-top:10px;">Send OTP</button>
        </form>

        <p style="text-align:center;margin-top:20px;color:var(--muted)">
            Already have an account?
            <a href="/login" style="font-weight:600">Login</a>
        </p>
    </div>

</div>

</body>
</html>
